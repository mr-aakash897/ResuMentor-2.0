<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ResuMentor AI logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5efe7"/>
      <stop offset="100%" stop-color="#e8d8c3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6b08c"/>
      <stop offset="100%" stop-color="#c8a27a"/>
    </linearGradient>
    <linearGradient id="darkAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f443b"/>
      <stop offset="100%" stop-color="#2f2a26"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)" stroke="#c8a27a" stroke-width="1.5"/>

  <!-- Robot head (AI identity) -->
  <rect x="21" y="10" width="22" height="15" rx="5" fill="url(#darkAccent)"/>
  <circle cx="29" cy="17.5" r="2.2" fill="#f7efe5"/>
  <circle cx="35" cy="17.5" r="2.2" fill="#f7efe5"/>
  <rect x="30" y="7" width="4" height="4" rx="2" fill="url(#accent)"/>

  <!-- Resume document -->
  <path d="M18 24h19l7 7v18a5 5 0 0 1-5 5H18a5 5 0 0 1-5-5V29a5 5 0 0 1 5-5z" fill="#ffffff" opacity="0.98"/>
  <path d="M37 24v7h7z" fill="#efe3d4"/>
  <rect x="19" y="33" width="17" height="2.7" rx="1.35" fill="#6e5945"/>
  <rect x="19" y="38.2" width="14" height="2.4" rx="1.2" fill="#8f7560" opacity="0.85"/>
  <rect x="19" y="43" width="12" height="2.4" rx="1.2" fill="#8f7560" opacity="0.72"/>

  <!-- Interview badge: speech bubble + microphone -->
  <path d="M45 37c3.31 0 6 2.69 6 6s-2.69 6-6 6h-2.2l-2.8 2 .65-2.2A6 6 0 0 1 39 43c0-3.31 2.69-6 6-6z" fill="url(#accent)"/>
  <rect x="43.85" y="40.3" width="2.3" height="5.1" rx="1.15" fill="#fff7ee"/>
  <rect x="43.1" y="45.8" width="3.8" height="1.2" rx="0.6" fill="#fff7ee"/>

  <!-- Subtle AI signal arcs -->
  <path d="M48.2 40.7a2.5 2.5 0 0 1 0 4.6" fill="none" stroke="#fff7ee" stroke-width="1" stroke-linecap="round" opacity="0.95"/>
  <path d="M49.8 39.7a3.9 3.9 0 0 1 0 6.6" fill="none" stroke="#fff7ee" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
</svg>